<!-- hero.component.html -->
     <!-- App Nav -->
    <app-nav></app-nav>
<div class="relative min-h-screen bg-gray-900 overflow-hidden">
    
    <!-- Animated Tech Background (conservé) -->
    <div class="absolute inset-0 opacity-30">
        <!-- Neural network lines animation -->
        <div class="absolute inset-0">
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-gradient-to-r from-orange-500/40 to-transparent rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-gradient-to-l from-blue-500/40 to-transparent rounded-full blur-3xl animate-pulse delay-1000"></div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full">
                <svg class="w-full h-full" viewBox="0 0 800 600">
                    <!-- Neural network connections -->
                    <g class="animate-pulse">
                        <circle cx="400" cy="300" r="4" fill="#f97316" class="animate-ping"/>
                        <circle cx="200" cy="200" r="4" fill="#f97316" class="animate-ping delay-300"/>
                        <circle cx="600" cy="400" r="4" fill="#f97316" class="animate-ping delay-700"/>
                        <circle cx="300" cy="400" r="4" fill="#f97316" class="animate-ping delay-500"/>
                        <circle cx="500" cy="200" r="4" fill="#f97316" class="animate-ping delay-200"/>
                        
                        <!-- Connection lines -->
                        <line x1="400" y1="300" x2="200" y2="200" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" class="animate-pulse"/>
                        <line x1="400" y1="300" x2="600" y2="400" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" class="animate-pulse delay-300"/>
                        <line x1="400" y1="300" x2="300" y2="400" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" class="animate-pulse delay-500"/>
                        <line x1="400" y1="300" x2="500" y2="200" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" class="animate-pulse delay-700"/>
                    </g>
                    
                    <!-- Floating code snippets -->
                    <text x="100" y="100" fill="#f97316" opacity="1" class="animate-float text-2xl font-mono">&lt;/&gt;</text>
                    <text x="150" y="500" fill="#3b82f6" opacity="1" class="animate-float delay-300 text-2xl font-mono">() =&gt;</text>
                    <text x="650" y="150" fill="#8b5cf6" opacity="1" class="animate-float delay-700 text-2xl font-mono">JSX</text>
                    <text x="-20" y="350" fill="#8b5cf6" opacity="1" class="animate-float delay-700 text-2xl font-mono">TS</text>
                </svg>
            </div>
        </div>
        
        <!-- Binary rain effect -->
        <div class="absolute inset-0 opacity-20">
            <div class="binary-rain"></div>
        </div>
    </div>

    <!-- Main Hero Content -->
    <header class="relative z-10 container mx-auto px-4 sm:px-6 lg:px-8 pt-10 pb-20">
        
        <!-- 1. Disponible pour missions freelance - En haut -->
        <div class="text-center mb-5" data-aos="fade-down" data-aos-duration="800">
            <div class="inline-block bg-gradient-to-r from-orange-500 to-orange-600 text-white 
                        px-4 py-2 sm:px-6 sm:py-3 md:px-8 md:py-4 
                        rounded-full shadow-lg shadow-orange-500/30">
                
                <span class="font-medium text-lg sm:text-base md:text-lg flex items-center gap-2 sm:gap-3 text-center">
                
                <span class="relative flex h-3 w-3 sm:h-4 sm:w-4">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 sm:h-4 sm:w-4 bg-white"></span>
                </span>

                <span class="leading-tight">
                    Disponible pour missions freelance
                </span>

                </span>
            </div>
            </div>
        
        <!-- 2. Je suis Emmanuel Bamidélé, Dev Full-Stack orienté backend -->
        <div class="text-center mb-16" data-aos="fade-up" data-aos-duration="800" data-aos-delay="100">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-4">
                <span class="text-white">Je suis </span>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-blue-400">
                    Emmanuel Bamidélé
                </span>
            </h1>
            <p class="text-2xl md:text-3xl text-gray-300">
                Developpeur <span class="font-bold text-orange-400">Full-Stack</span> orienté 
                <span class="font-bold text-orange-400">backend</span>
            </p>
        </div>

        <!-- 3. Flex profil et technos -->
        <div class="flex flex-col lg:flex-row items-center justify-center gap-16 lg:gap-24 mb-16">
            
            <!-- Photo de profil -->
            <div class="relative flex-shrink-0" data-aos="fade-right" data-aos-duration="1000" data-aos-delay="200">
                
                <!-- Animated ring around profile -->
                <div class="absolute inset-0 rounded-full bg-gradient-to-r from-orange-500 via-blue-500 to-purple-500 animate-spin-slow blur-md"></div>
                <div class="absolute inset-2 rounded-full bg-gray-900"></div>
                
                <!-- Profile image -->
                <div class="relative w-72 h-72 rounded-full overflow-hidden border-4 border-gray-800 shadow-2xl">
                    <img [src]="image.profil" alt="Emmanuel Bamidélé" class="w-full h-full object-cover">
                </div>
                
                <!-- Badges autour de la photo -->
                <div class="absolute -top-4 -right-4 animate-bounce">
                    <span class="bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-mono shadow-lg shadow-orange-500/50">Backend</span>
                </div>
                <div class="absolute -bottom-4 -left-4 animate-bounce delay-300">
                    <span class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm font-mono shadow-lg shadow-blue-500/50">Full-Stack</span>
                </div>
            </div>

            <!-- Langages alignés avec grille responsive -->
            <div class="w-full max-w-3xl" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="300">
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 gap-3 md:gap-4">
                    <!-- Laravel -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-red-600/50 shadow-lg shadow-red-600/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="650">
                        <span class="text-red-500 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">Laravel</span>
                    </div>

                    <!-- PHP -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-purple-500/50 shadow-lg shadow-purple-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="600">
                        <span class="text-purple-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">PHP</span>
                    </div>

                                        
                    <!-- Python -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-blue-500/50 shadow-lg shadow-blue-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="450">
                        <span class="text-blue-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">Python</span>
                    </div>
                    
                    <!-- JavaScript -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-yellow-500/50 shadow-lg shadow-yellow-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="400">
                        <span class="text-yellow-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">JavaScript</span>
                    </div>

                    <!-- TypeScript -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-blue-400/50 shadow-lg shadow-blue-400/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="900">
                        <span class="text-blue-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">TypeScript</span>
                    </div>
                    
                    <!-- React Js -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-cyan-500/50 shadow-lg shadow-cyan-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="500">
                        <span class="text-cyan-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">React Js</span>
                    </div>

                    <!-- React Native -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-cyan-400/50 shadow-lg shadow-cyan-400/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="850">
                        <span class="text-cyan-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">React Native</span>
                    </div>

                    <!-- Angular -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-red-500/50 shadow-lg shadow-red-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="550">
                        <span class="text-red-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">Angular</span>
                    </div>
                    
                    <!-- MySQL -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-blue-600/50 shadow-lg shadow-blue-600/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="750">
                        <span class="text-blue-500 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">MySQL</span>
                    </div>
                    
                    <!-- PostgreSQL -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-indigo-500/50 shadow-lg shadow-indigo-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="800">
                        <span class="text-indigo-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">PostgreSQL</span>
                    </div>
                    
                    <!-- Docker -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-teal-500/50 shadow-lg shadow-teal-500/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="950">
                        <span class="text-teal-400 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">Docker</span>
                    </div>

                    <!-- Git -->
                    <div class="bg-gray-800/90 backdrop-blur-sm px-3 py-3 md:px-4 md:py-4 rounded-lg border-2 border-orange-600/50 shadow-lg shadow-orange-600/30 hover:scale-105 transition-transform duration-300 text-center" data-aos="zoom-in" data-aos-delay="700">
                        <span class="text-orange-500 font-mono font-bold text-sm md:text-base lg:text-lg whitespace-nowrap">Git</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 4. Les deux boutons de cv et me contacter -->
        <div class="flex flex-wrap gap-6 justify-center items-center" data-aos="fade-up" data-aos-duration="800" data-aos-delay="400">
            <!-- Download CV Button -->
            <button (click)="downloadCV()" 
                    [disabled]="isDownloading"
                    class="group relative inline-flex items-center gap-2 bg-gradient-to-r from-orange-500 to-orange-600 text-white px-10 py-5 rounded-lg font-medium text-xl shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 transition-all duration-300 hover:scale-105 overflow-hidden min-w-[220px] justify-center">
                
                <span class="absolute inset-0 bg-gradient-to-r from-orange-600 to-orange-700 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
                
                <!-- Loading spinner -->
                <span *ngIf="isDownloading" class="absolute inset-0 flex items-center justify-center bg-orange-600">
                    <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="ml-2">Téléchargement...</span>
                </span>
                
                <!-- Button content -->
                <span *ngIf="!isDownloading" class="relative flex items-center gap-3">
                    <svg class="w-7 h-7 group-hover:animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Télécharger CV
                </span>
            </button>
            
            <!-- Contact Button -->
            <a href="#contact" 
               class="group relative inline-flex items-center gap-2 bg-transparent border-2 border-orange-500 text-orange-400 px-10 py-5 rounded-lg font-medium text-xl hover:bg-orange-500 hover:text-white transition-all duration-300 hover:scale-105">
                <span class="flex items-center gap-3">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Me Contacter
                </span>
            </a>
        </div>
    </header>
</div>

<app-apropos id="apropos"></app-apropos>

<app-competences id="competence"></app-competences>

<app-projets id="projet"></app-projets>

<app-experiences id="experience"></app-experiences>

<app-chat id = "chat"></app-chat>

<app-contacts id="contact"></app-contacts>

<app-footer></app-footer>
