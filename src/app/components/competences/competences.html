<!-- competences.component.html -->
<div class="relative min-h-screen bg-gray-900 overflow-hidden py-20">
    
    <!-- Animated Neural Network Background -->
    <div class="absolute inset-0 opacity-15">
        <div class="absolute inset-0">
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-gradient-to-r from-orange-500/20 to-transparent rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-gradient-to-l from-blue-500/20 to-transparent rounded-full blur-3xl animate-pulse delay-1000"></div>
            
            <!-- SVG Neural Network -->
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full">
                <svg class="w-full h-full" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                    <g class="animate-pulse">
                        <!-- Nœuds principaux -->
                        <circle cx="200" cy="150" r="5" fill="#f97316" class="animate-ping delay-300"/>
                        <circle cx="600" cy="150" r="5" fill="#3b82f6" class="animate-ping delay-700"/>
                        <circle cx="150" cy="450" r="5" fill="#8b5cf6" class="animate-ping delay-500"/>
                        <circle cx="650" cy="450" r="5" fill="#10b981" class="animate-ping delay-200"/>
                        
                        <!-- Nœuds secondaires -->
                        <circle cx="300" cy="200" r="4" fill="#f97316" class="animate-ping delay-400"/>
                        <circle cx="500" cy="200" r="4" fill="#f97316" class="animate-ping delay-600"/>
                        <circle cx="250" cy="350" r="4" fill="#3b82f6" class="animate-ping delay-300"/>
                        <circle cx="550" cy="350" r="4" fill="#8b5cf6" class="animate-ping delay-700"/>
                        
                        <!-- Connexions -->
                        <line x1="200" y1="150" x2="300" y2="200" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.25" class="animate-pulse delay-200"/>
                        <line x1="600" y1="150" x2="500" y2="200" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.25" class="animate-pulse delay-400"/>
                        <line x1="150" y1="450" x2="250" y2="350" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.25" class="animate-pulse delay-600"/>
                        <line x1="650" y1="450" x2="550" y2="350" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.25" class="animate-pulse delay-800"/>
                        
                        <!-- Connexions croisées -->
                        <line x1="300" y1="200" x2="250" y2="350" stroke="#ec4899" stroke-width="1" stroke-opacity="0.15" class="animate-pulse delay-300"/>
                        <line x1="500" y1="200" x2="550" y2="350" stroke="#f97316" stroke-width="1" stroke-opacity="0.15" class="animate-pulse delay-500"/>
                    </g>
                </svg>
            </div>
        </div>
        
        <!-- Binary rain léger -->
        <div class="absolute inset-0 opacity-5">
            <div class="binary-rain"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 container mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Titre de section -->
        <div class="text-center mb-12" data-aos="fade-down" data-aos-duration="800">
            <h2 class="text-4xl md:text-5xl font-bold mb-4">
                <span class="text-white">Mes </span>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-blue-400">
                    compétences
                </span>
            </h2>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                Les domaines dans lesquels j'excelle pour mener à bien vos projets
            </p>
            <div class="w-24 h-1 bg-gradient-to-r from-orange-500 to-blue-500 mx-auto rounded-full mt-4"></div>
        </div>
        
        <!-- Grille de compétences -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div *ngFor="let comp of competences; let i = index" 
                 class="group" 
                 [attr.data-aos]="'fade-up'"
                 [attr.data-aos-duration]="'800'"
                 [attr.data-aos-delay]="100 + (i * 50)">
                
                <!-- Carte de compétence -->
                <div class="bg-gray-800/50 backdrop-blur-sm rounded-xl p-8 border border-gray-700 hover:border-orange-500/50 transition-all duration-500 hover:shadow-2xl hover:shadow-orange-500/20 hover:-translate-y-2 h-full flex flex-col">
                    
                    <!-- Icône avec animation -->
                    <div class="mb-6 relative">
                        <div class="w-20 h-20 rounded-xl bg-gradient-to-br from-gray-700 to-gray-800 p-4 group-hover:scale-110 group-hover:rotate-3 transition-all duration-500 mx-auto">
                            <img [src]="comp.icon" [alt]="comp.title" class="w-full h-full object-contain">
                        </div>
                        
                        <!-- Petit cercle d'accent -->
                        <div class="absolute -top-2 -right-2 w-4 h-4 bg-orange-500 rounded-full animate-ping opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    </div>
                    
                    <!-- Titre -->
                    <h3 class="text-xl font-bold text-white text-center mb-4 group-hover:text-orange-400 transition-colors duration-300">
                        {{ comp.title }}
                    </h3>
                    
                    <!-- Description -->
                    <p class="text-gray-400 leading-relaxed text-center flex-grow">
                        {{ comp.description }}
                    </p>
                    
                    <!-- Ligne décorative au survol -->
                    <div class="w-0 h-0.5 bg-gradient-to-r from-orange-500 to-blue-500 mx-auto mt-4 group-hover:w-16 transition-all duration-500"></div>
                </div>
            </div>
        </div>
    </div>
</div>
